<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Appointment Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2c3746 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin: 30px 0 20px 0;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .billing-button {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
            text-align: center;
            text-decoration: none;
        }
        
        .billing-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }
        
        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hospital Appointment</h1>
        
        <div class="success-message" id="successMessage">
            Appointment booked successfully!
        </div>
        
        <form id="appointmentForm">
            <div class="form-row">
                <div style="margin-bottom: 15px;">
  <label for="patientSelect"><strong>Patient Name:</strong></label><br>
  <select id="patientSelect" name="patient_id">
    <option value="">-- Select Patient --</option>
  </select>
</div>

<div style="margin-bottom: 15px;">
  <label for="doctorSelect"><strong>Doctor Name:</strong></label><br>
  <select id="doctorSelect" name="doctor_id">
    <option value="">-- Select Doctor --</option>
  </select>
</div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="appointmentDate">Appointment Date *</label>
                    <input type="date" id="appointmentDate" name="appointmentDate" required>
                </div>
                
                <div class="form-group">
                    <label for="appointmentTime">Appointment Time *</label>
                    <input type="time" id="appointmentTime" name="appointmentTime" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="reason">Reason for Visit *</label>
                <textarea id="reason" name="reason" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="status">Status *</label>
                <select id="status" name="status" required>
                    <option value="">Select Status</option>
                    <option value="scheduled">Scheduled</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                    <option value="rescheduled">Rescheduled</option>
                </select>
            </div>
            
            <h2>Treatment Section</h2>
            <div class="form-group">
                <label for="treatmentType">Treatment Type</label>
                <select id="treatmentType" name="treatmentType">
                    <option value="">Select Treatment</option>
                    <option value="medication">Medication</option>
                    <option value="therapy">Therapy</option>
                    <option value="surgery">Surgery</option>
                    <option value="consultation">Consultation</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="treatmentDetails">Treatment Details</label>
                <textarea id="treatmentDetails" name="treatmentDetails" placeholder="Describe the treatment plan..."></textarea>
            </div>
            
            
            
            <div class="form-row">
                <div class="form-group">
                    <label for="treatmentCost">Treatment Cost</label>
                    <input type="number" id="treatmentCost" name="treatmentCost" step="0.01" placeholder="Enter cost in USD">
                </div>
                
                <div class="form-group">
                    <label for="treatmentDate">Treatment Date</label>
                    <input type="date" id="treatmentDate" name="treatmentDate">
                </div>
            </div>
            
            <a href="billing.html" class="billing-button">Go to Billing</a>
            
            <button type="submit">Book Appointment</button>
        </form>
    </div>
    
    <script>
        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form data
            const formData = {
                patientId: document.getElementById('patientId').value,
                doctorId: document.getElementById('doctorId').value,
                appointmentDate: document.getElementById('appointmentDate').value,
                appointmentTime: document.getElementById('appointmentTime').value,
                reason: document.getElementById('reason').value,
                status: document.getElementById('status').value,
                treatmentType: document.getElementById('treatmentType').value,
                treatmentDetails: document.getElementById('treatmentDetails').value,
                treatmentTypeDescription: document.getElementById('treatmentTypeDescription').value,
                treatmentCost: document.getElementById('treatmentCost').value,
                treatmentDate: document.getElementById('treatmentDate').value
            };
            
            // Log form data (in production, send to server)
            console.log('Appointment Data:', formData);
            
            // Show success message
            document.getElementById('successMessage').style.display = 'block';
            
            // Reset form
            this.reset();
            
            // Hide success message after 3 seconds
            setTimeout(function() {
                document.getElementById('successMessage').style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
