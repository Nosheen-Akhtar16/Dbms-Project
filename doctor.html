<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Information Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#2c3746 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Doctor Information Form</h1>
        <div style="text-align: center; margin-bottom: 20px;">
            <svg width="120" height="120" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Head -->
                <circle cx="50" cy="25" r="20" fill="#fdbcb4" stroke="#000" stroke-width="1"/>
                <!-- Blush -->
                <ellipse cx="40" cy="30" rx="3" ry="2" fill="#ff9999" opacity="0.5"/>
                <ellipse cx="60" cy="30" rx="3" ry="2" fill="#ff9999" opacity="0.5"/>
                <!-- Eyes -->
                <circle cx="45" cy="20" r="3" fill="#000"/>
                <circle cx="55" cy="20" r="3" fill="#000"/>
                <!-- Eye highlights -->
                <circle cx="46" cy="19" r="1" fill="#fff"/>
                <circle cx="56" cy="19" r="1" fill="#fff"/>
                <!-- Mouth -->
                <path d="M 47 32 Q 50 35 53 32" stroke="#000" stroke-width="1" fill="none"/>
                <!-- Hair -->
                <path d="M 30 18 Q 35 8 50 12 Q 65 8 70 18" fill="#8B4513"/>
                <!-- Body -->
                <rect x="40" y="45" width="20" height="28" fill="#fff" stroke="#000" stroke-width="1"/>
                <!-- Arms -->
                <line x1="40" y1="50" x2="32" y2="58" stroke="#fdbcb4" stroke-width="4"/>
                <line x1="60" y1="50" x2="68" y2="58" stroke="#fdbcb4" stroke-width="4"/>
                <!-- Legs -->
                <line x1="45" y1="73" x2="42" y2="83" stroke="#fdbcb4" stroke-width="4"/>
                <line x1="55" y1="73" x2="58" y2="83" stroke="#fdbcb4" stroke-width="4"/>
                <!-- Stethoscope -->
                <circle cx="50" cy="52" r="5" fill="#fff" stroke="#000" stroke-width="1"/>
                <line x1="50" y1="47" x2="50" y2="57" stroke="#000" stroke-width="1"/>
                <line x1="45" y1="52" x2="35" y2="52" stroke="#000" stroke-width="1"/>
                <line x1="55" y1="52" x2="65" y2="52" stroke="#000" stroke-width="1"/>
                <!-- Ears -->
                <circle cx="30" cy="25" r="4" fill="#fdbcb4"/>
                <circle cx="70" cy="25" r="4" fill="#fdbcb4"/>
            </svg>
        </div>
        <form>
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName" name="firstName" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName" name="lastName" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="license">License Number:</label>
                    <input type="text" id="license" name="license" required>
                </div>
                <div class="form-group">
                    <label for="specialization">Specialization:</label>
                    <input type="text" id="specialization" name="specialization" required>
                </div>
            </div>

            <div class="form-group">
                <label for="hospital">Hospital/Clinic:</label>
                <input type="text" id="hospital" name="hospital" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="experience">Years of Experience:</label>
                    <input type="number" id="experience" name="experience" min="0" required>
                </div>
                
            </div>

            

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
